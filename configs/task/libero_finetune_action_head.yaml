# @package _global_

# Fine-tuning task configuration for LIBERO
# This demonstrates how to fine-tune only the action head

defaults:
  - override /data: libero_2cam
  - override /model: fastwam
  - _self_

# Task-specific settings
task_name: libero_finetune_action_head_only

# Fine-tuning strategy
finetune:
  freeze_strategy: "action_head_only"  # Only train action head
  freeze_video_expert: true
  freeze_action_backbone: true

# Data configuration is inherited from /data: libero_2cam
# Only override specific values if needed

# Training configuration
learning_rate: 1.0e-5  # Smaller learning rate for fine-tuning
batch_size: 30
gradient_accumulation_steps: 1
num_epochs: 3
save_every: 500
eval_every: 250
log_every: 10

# Must load pretrained checkpoint for fine-tuning
resume: "./checkpoints/fastwam_release/libero_uncond_2cam224.pt"

# Enable speed-weighted action loss for better fine-grained manipulation
# Prioritizes slow-speed actions (critical for precise manipulation) during training
model:
  loss:
    use_weighted_action_loss: true  # Enable speed-based weighting
    action_loss_weight_strategy: "inverse"  # Options: inverse, inverse_squared, exp_decay, log
    action_loss_clip_max_weight: 2.0  # Maximum weight multiplier to avoid extreme values
    action_loss_alpha: 2.0  # Decay rate for exp_decay strategy
    action_loss_use_l1: true  # L1 loss (more robust to outliers than MSE)
    action_loss_normalize_weights: true  # Normalize weights to have mean=1

# Output directory
output_dir: ./runs/finetune/libero_action_head/${now:%Y-%m-%d}_${now:%H-%M-%S}

# Wandb logging for fine-tuning
wandb:
  enabled: true  # Enable wandb logging
  workspace: pengdaojie-the-hong-kong-university-of-science-and-techn  # Set your wandb workspace/username here
  project: fastwam-finetune
  name: libero_finetune_action_head
  group: finetune  # Group all fine-tuning runs together
  mode: online
