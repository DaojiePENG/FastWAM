# @package _global_

# Fine-tuning task configuration for RoboTwin
# This demonstrates how to fine-tune only the action head

defaults:
  - override /data: robotwin
  - override /model: fastwam
  - _self_

# Task-specific settings
task_name: robotwin_finetune_action_head_only

# Fine-tuning strategy
finetune:
  freeze_strategy: "action_head_only"  # Only train action head
  freeze_video_expert: true
  freeze_action_backbone: true

# Data configuration is inherited from /data: robotwin
# Only override specific values if needed

# Training configuration
learning_rate: 5.0e-6  # Even smaller learning rate for RoboTwin fine-tuning
batch_size: 16
num_epochs: 5
save_every: 2500
eval_every: 500
log_every: 10

# Must load pretrained checkpoint for fine-tuning
resume: "./checkpoints/fastwam_release/robotwin_uncond_3cam_384.pt"

# Output directory
output_dir: ./runs/finetune/robotwin_action_head/${now:%Y-%m-%d}_${now:%H-%M-%S}
