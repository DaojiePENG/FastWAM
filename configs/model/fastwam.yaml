_target_: fastwam.runtime.create_fastwam
model_id: Wan-AI/Wan2.2-TI2V-5B
tokenizer_model_id: Wan-AI/Wan2.1-T2V-1.3B
tokenizer_max_len: 128
load_text_encoder: false
proprio_dim: ${data.train.processor.proprio_output_dim}
redirect_common_files: true
mot_checkpoint_mixed_attn: true
action_dit_pretrained_path: checkpoints/ActionDiT_linear_interp_Wan22_alphascale_1024hdim.pt
skip_dit_load_from_pretrain: false

video_dit_config:
  has_image_input: false
  patch_size: [1, 2, 2]
  in_dim: 48
  hidden_dim: 3072
  ffn_dim: 14336
  freq_dim: 256
  text_dim: 4096
  out_dim: 48
  num_heads: 24
  attn_head_dim: 128
  num_layers: 30
  eps: 1.0e-06
  seperated_timestep: true
  require_clip_embedding: false
  require_vae_embedding: false
  fuse_vae_embedding_in_latents: true
  use_gradient_checkpointing: ${model.mot_checkpoint_mixed_attn}
  video_attention_mask_mode: "first_frame_causal" # default
  action_conditioned: false
  action_dim: ${data.train.processor.action_output_dim}
  action_group_causal_mask_mode: "group_diagonal"

action_dit_config:
  action_dim: ${data.train.processor.action_output_dim}
  hidden_dim: 1024
  ffn_dim: 4096
  num_heads: 24
  attn_head_dim: 128
  num_layers: 30
  text_dim: 4096
  freq_dim: 256
  eps: 1.0e-06
  use_gradient_checkpointing: ${model.mot_checkpoint_mixed_attn}

video_scheduler:
  train_shift: 5.0
  infer_shift: 5.0
  num_train_timesteps: 1000

action_scheduler:
  train_shift: 5.0
  infer_shift: 5.0
  num_train_timesteps: 1000

loss:
  lambda_action: 1.0

  # Speed-weighted action loss configuration
  # Core idea: Assign higher weights to slow-speed actions (fine-grained manipulation)
  # and lower weights to fast-speed actions during training
  use_weighted_action_loss: false  # Enable speed-based action loss weighting (default: disabled for backward compatibility)

  # Weight computation strategy (only used if use_weighted_action_loss=true)
  action_loss_weight_strategy: "inverse"  # Options: inverse, inverse_squared, exp_decay, log

  # Weight clipping to avoid extreme values
  action_loss_clip_max_weight: 2.0  # Maximum weight multiplier

  # Exponential decay parameter (only for exp_decay strategy)
  action_loss_alpha: 2.0

  # Loss function type
  action_loss_use_l1: true  # true: L1 loss (robust to outliers), false: MSE loss

  # Weight normalization
  action_loss_normalize_weights: true  # Normalize weights to have mean=1
